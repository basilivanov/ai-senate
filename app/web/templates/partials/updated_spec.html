<div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem; margin-bottom: 0.5rem; margin-top: 0;">
    <h2 style="font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin: 0;">Updated Spec</h2>
    {% if updated_spec %}
    <div style="display: flex; gap: 0.4rem;">
        <button class="btn-mini" onclick="copySpec()">Copy</button>
        <button class="btn-mini" onclick="downloadSpec()">Save</button>
        <button class="btn-mini btn-accept" 
                hx-post="/runs/{{ run_id }}/accept" 
                hx-target="#accept-banner-container" 
                hx-swap="outerHTML">Accept</button>
    </div>
    {% endif %}
</div>

{% if updated_spec %}
<div style="height: calc(100% - 35px); position: relative; min-height: 0;">
    <textarea readonly id="updated_spec_text" style="width: 100%; height: 100%; resize: none; background: #ffffff; border: 1px solid var(--panel-border); border-radius: 8px; font-family: monospace; font-size: 0.8rem; padding: 0.5rem; overflow: auto; color: var(--text-primary); outline: none;">{{ updated_spec }}</textarea>
</div>
<div id="accept-banner-container" style="position: absolute; bottom: 10px; right: 10px; left: 10px; z-index: 10;"></div>
{% else %}
<p class="placeholder-text">Ожидание результатов...</p>
{% endif %}
