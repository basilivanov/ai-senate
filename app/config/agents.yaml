defaults:
  provider: "cliproxy"
  opencode_agent: "plan"
  timeout_sec: 180
  effort: "max"
  temperature: 0.2
  require_json_output: true
  save_raw_output: true
  save_prompt: true

# Run profiles: declarative presets for different use cases.
# Each profile defines which jury, how many rounds, whether to run Writer,
# and whether project context (code digest + git diff) is included by default.
profiles:
  full_council:
    description: "Полный Совет — 4 перспективы, cross-review, writer"
    jury: default
    max_rounds: 2
    writer: true
    auto_stop_if_clean: true
    project_context: false

  quick_review:
    description: "Быстрое ревью — 2 модели, 1 раунд, без writer"
    jury: lite
    max_rounds: 1
    writer: false
    auto_stop_if_clean: true
    project_context: false

  code_review:
    description: "Ревью кода — 4 перспективы + контекст проекта + git diff"
    jury: default
    max_rounds: 2
    writer: true
    auto_stop_if_clean: true
    project_context: true

# Perspectives: each one = one reviewer with a focused role + one opencode model.
# The "key" also maps to .opencode/agents/<key>.md (system prompt) and to the
# .md file in .opencode/agents/ loaded by OpencodeAgentAdapter.
perspectives:
  # ===== 4 active perspectives, each backed by an opencode-go model =====

  glm51:
    enabled: true
    role: "Critical Reviewer — edge cases, contradictions, hidden assumptions"
    provider: "opencode-go"
    model: "glm-5.1"
    timeout_sec: 240

  kimi26:
    enabled: true
    role: "Coder — реализуемость, алгоритмы, читаемость, тесты"
    provider: "opencode-go"
    model: "kimi-k2.6"
    timeout_sec: 300

  minimax:
    enabled: true
    role: "Architect — границы, контракты, эволюция системы"
    provider: "opencode-go"
    model: "minimax-m3"
    timeout_sec: 240

  deepseekv4pro:
    enabled: true
    role: "DBA — модель данных, схема, миграции, перформанс"
    provider: "opencode-go"
    model: "deepseek-v4-pro"
    timeout_sec: 240

  # ===== legacy perspectives (kept disabled, available on demand) =====

  architect:
    enabled: false
    role: "Architect — границы, контракты, эволюция системы"
    provider: "cliproxy"
    model: "claude-sonnet-4-6"
    timeout_sec: 240

  dba:
    enabled: false
    role: "DBA — модель данных, схема, миграции, перформанс"
    provider: "cliproxy"
    model: "claude-sonnet-4-6"
    timeout_sec: 240

  coder:
    enabled: false
    role: "Разработчик — реализуемость, алгоритмы, читаемость, тесты"
    provider: "cliproxy"
    model: "claude-sonnet-4-6"
    timeout_sec: 240

  security:
    enabled: false
    role: "Security — модель угроз, аутентификация, защита данных, compliance"
    provider: "cliproxy"
    model: "claude-sonnet-4-6"
    timeout_sec: 240

  critical:
    enabled: false
    role: "Критик — противоречия, двусмысленности, скрытые допущения, edge cases"
    provider: "cliproxy"
    model: "claude-sonnet-4-6"
    timeout_sec: 240

  synthesizer:
    enabled: false
    role: "Синтезатор — объединение выводов Совета, приоритезация, план"
    provider: "cliproxy"
    model: "claude-opus-4-6-thinking"
    timeout_sec: 300

# Special: the writer agent rewrites the spec, not reviews it.
writer:
  enabled: true
  role: "Writer — обновление спецификации по выводам Совета"
  provider: "opencode-go"
  model: "deepseek-v4-flash"
  timeout_sec: 600

# Juries: named groupings of perspectives used by the orchestrator.
# The default jury is used for round 1, 2, 3 (independent review / cross-review / final check).
juries:
  default:
    - glm51
    - kimi26
    - minimax
    - deepseekv4pro
  lite:
    - glm51
    - kimi26
  synthesis:
    - synthesizer
